<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="ad.size" content="width=1024,height=768" />
    <title>VIVERSE advertisement</title>

    <!-- ================================================================ -->
    <!-- ★★★ 可調整設定 ★★★ 修改下方四個值即可，其他地方不用動         -->
    <!-- IFRAME_SRC 要加上 utm                                            -->
    <!-- 若 WIDTH/HEIGHT 改變，上方 <meta name="ad.size"> 也要同步調整    -->
    <!-- ================================================================ -->
    <script type="text/javascript">
      const CONFIG = {
        WIDTH: 1024,
        HEIGHT: 768,
        IFRAME_SRC:
          'https://www.viverse.com/LpcA8dm?full3d=&no-cookie=&autoplay=1&controls=0&utm_campaign=bloxdio',
        CLICK_URL: 'https://www.viverse.com/genre/VIVERSE%20plus',
      }
      var clickTag = CONFIG.CLICK_URL
    </script>
    <!-- ================================================================ -->

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .frame-wrap {
        position: relative;
        width: fit-content;
      }
      iframe {
        display: block;
        border: 0;
      }
      .click-overlay {
        position: absolute;
        inset: 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="frame-wrap">
      <iframe id="ad-iframe" title="VIVERSE world" allowfullscreen></iframe>
      <div id="click-overlay" class="click-overlay"></div>
    </div>

    <script>
      const iframe = document.getElementById('ad-iframe')
      iframe.width = CONFIG.WIDTH
      iframe.height = CONFIG.HEIGHT
      iframe.src = CONFIG.IFRAME_SRC

      document.getElementById('click-overlay').onclick = () => {
        window.open(clickTag, '_blank')
      }
    </script>
  </body>
</html>
